<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buch-Anzeigen-Helfer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Buch-Anzeigen-Helfer</h1>
    <div class="header-buttons">
      <button id="font-dec" type="button" title="Schrift kleiner">A−</button>
      <button id="font-inc" type="button" title="Schrift größer">A+</button>
      <button id="prompt-btn" type="button">Anweisungen</button>
      <button id="settings-btn" type="button">Einstellungen</button>
    </div>
  </header>

  <main>
    <section id="drop-zone" class="drop-zone">
      <p>Fotos des Buches hierher ziehen</p>
      <input id="file-input" type="file" accept="image/*" multiple hidden>
      <button id="choose-btn" type="button">Fotos auswählen</button>
      <div id="thumbs" class="thumbs"></div>
    </section>

    <button id="generate-btn" type="button" class="primary" disabled>Anzeige erstellen</button>
    <button id="new-case-btn" type="button">Neuen Fall starten</button>
    <p id="status" class="status"></p>

    <section id="result" class="result" hidden>
      <label>Titel <input id="f-title" maxlength="80"></label>
      <label>Autor <input id="f-author"></label>
      <label>Buchtitel <input id="f-book_title"></label>
      <label>Sprache <input id="f-language"></label>
      <label>Verlag <input id="f-publisher"></label>
      <label>Erscheinungsjahr <input id="f-publication_year"></label>
      <label>Format <input id="f-book_format"></label>
      <label>Beschreibung <span class="sub">(so erscheint sie ungefähr bei eBay – direkt bearbeitbar)</span>
        <div id="f-description" class="rich" contenteditable="true"></div>
      </label>
      <label>Preis (EUR, z. B. 9.99) <input id="f-price" value="9.99"></label>
      <label>Zustand
        <select id="f-condition">
          <option value="1000">Neu</option>
          <option value="2750">Wie neu</option>
          <option value="4000">Sehr gut</option>
          <option value="5000" selected>Gut</option>
          <option value="6000">Akzeptabel</option>
        </select>
      </label>
      <div class="save-area">
        <div class="folder-line">
          <span>Speicherordner:</span>
          <span id="folder-path" class="folder-path">– noch nicht gewählt –</span>
          <button id="choose-folder-btn" type="button">Ordner wählen</button>
        </div>
        <button id="save-csv-btn" type="button" class="primary">Zur eBay-Sammeldatei hinzufügen</button>
      </div>
    </section>

    <button id="quit-btn" type="button" class="quit">Programm beenden</button>
  </main>

  <dialog id="settings-dialog">
    <form method="dialog">
      <h2>Einstellungen</h2>
      <label>Anthropic-API-Schlüssel <input id="s-anthropic" type="password"></label>
      <label>imgbb-API-Schlüssel <input id="s-imgbb" type="password"></label>
      <label>KI-Modell
        <select id="s-model">
          <option value="claude-sonnet-4-6">Sonnet (günstig)</option>
          <option value="claude-opus-4-8">Opus (stärker)</option>
        </select>
      </label>
      <label>Standort <input id="s-location" value="Berlin"></label>
      <label>Versandkosten <input id="s-shipping_cost" value="5.49"></label>
      <menu>
        <button id="s-save" value="save">Speichern</button>
        <button value="cancel">Abbrechen</button>
      </menu>
    </form>
  </dialog>

  <dialog id="prompt-dialog">
    <form method="dialog">
      <h2>Anweisungen</h2>
      <p class="hint">Hier legst du fest, wie die KI die Anzeige schreiben soll.
        Oben gelten allgemeine Regeln, darunter gibt es für jedes Feld eine eigene Anweisung.</p>
      <label>Allgemeine Regeln
        <textarea id="p-general" rows="4"></textarea>
      </label>
      <div id="p-fields"></div>
      <label>Beispiel-Beschreibung <span class="sub">(optional – die KI übernimmt nur Stil und Aufbau, nicht die Inhalte)</span>
        <textarea id="p-examples" rows="1"></textarea>
      </label>
      <menu>
        <button id="p-save" value="save">Speichern</button>
        <button value="cancel">Abbrechen</button>
      </menu>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
